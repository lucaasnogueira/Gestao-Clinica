version: '3.8'

# ======================================================
# Docker Compose — clinic-web (Frontend)
#
# Para rodar APENAS o frontend (API deve estar rodando):
#   docker compose up -d
#
# Para rodar com Nginx em produção:
#   docker compose --profile production up -d
# ======================================================

services:

  # ----------------------------------------
  # Next.js — aplicação frontend
  # ----------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL pública da API (acessada pelo browser do usuário)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    container_name: clinic_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env.docker
    environment:
      NODE_ENV: production
      # URL interna da API (server-side rendering, dentro da rede Docker)
      # Se o backend roda no mesmo compose, use o nome do serviço:
      # API_URL: http://api:3001/api
      API_URL: ${API_URL:-http://localhost:3001/api/v1}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - clinic_network

  # ----------------------------------------
  # Nginx — reverse proxy (produção)
  # Ative com: --profile production
  # ----------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: clinic_nginx
    restart: unless-stopped
    profiles: [production]
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - clinic_network

networks:
  clinic_network:
    name: clinic_network
    # Se o backend roda em outro compose, use rede externa:
    # external: true
